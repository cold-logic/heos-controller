<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heos Controller</title>
  <script>
    // Apply OS colour scheme immediately to avoid a flash of the wrong theme
    (function () {
      var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    })();
  </script>
</head>

<body>
  <div id="main-card" class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h3 class="card-title mb-0">Heos Controller</h3>
      <button id="settings-btn" class="btn btn-link p-0 text-decoration-none" aria-label="Settings">
        <i class="bi bi-gear-fill text-body"></i>
      </button>
    </div>
    <div class="card-body">
      <div class="container-fluid">
        <div class="row">
          <div class="col-12">
            <label for="speaker" class="form-label">Select a speaker <span id="speaker_count"></span></label>
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-12">
            <div class="input-group">
              <select id="speaker" class="form-select">
                <option>--</option>
              </select>
              <button id="refresh" class="btn btn-outline-secondary" type="button" aria-label="Refresh speaker list">
                <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </div>
        <div class="row volume-row flex-grow-1 justify-content-center align-items-center">
          <div class="volume-dial">
            <input type="text" value="0" class="dial">
          </div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <div class="row">
        <div id="prev" class="col-4 text-center control" role="button" tabindex="0" aria-label="Previous track">
          <i class="bi bi-skip-backward-fill" aria-hidden="true"></i>
        </div>
        <div id="state" class="col-4 text-center control" role="button" tabindex="0" aria-label="Play/Pause">
          <i class="bi bi-play-fill" aria-hidden="true"></i>
        </div>
        <div id="next" class="col-4 text-center control" role="button" tabindex="0" aria-label="Next track">
          <i class="bi bi-skip-forward-fill" aria-hidden="true"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="settingsModalLabel">Settings</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="interface-select" class="form-label">Network Interface</label>
            <select id="interface-select" class="form-select">
              <option value="auto">Auto-Detect (Recommended)</option>
            </select>
            <div class="form-text">Select the network used to find your speakers.</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="save-settings" class="btn btn-primary">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
